name: Deploy OrderDeliveryProcessor Azure Function

on:
  push:
    branches:
      - main
    paths:
      - 'src/OrderDeliveryProcessor/**'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish
        run: dotnet publish src/OrderDeliveryProcessor/OrderDeliveryProcessor.csproj --configuration Release --output ./publish

      - name: Deploy to Azure Function App
        uses: Azure/functions-action@v1
        with:
          app-name: OrderDeliveryProcessor-eshopuksouth
          package: ./publish
          publish-profile: ${{ secrets.AZURE_DELIVERY_PROCESSOR_PUBLISH_PROFILE }}