name: Build and deploy .NET 10 to OrderItemsReserver-eshopuksouth

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AZURE_FUNCTIONAPP_PACKAGE_PATH: 'src/OrderItemsReserver'
  DOTNET_VERSION: '10.0'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 'Checkout GitHub Action'
        uses: actions/checkout@v4

      - name: Setup DotNet ${{ env.DOTNET_VERSION }} Environment
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: 'Build and Publish'
        shell: bash
        run: |
          dotnet publish ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}/OrderItemsReserver.csproj --configuration Release --output ./publish-output

      - name: 'Deploy to Azure'
        uses: Azure/functions-action@v1
        with:
          app-name: 'OrderItemsReserver-eshopuksouth'
          package: './publish-output'
          publish-profile: ${{ secrets.AZURE_FUNCTION_PUBLISH_PROFILE_API_SOUTH }}
          sku: 'flexconsumption'
