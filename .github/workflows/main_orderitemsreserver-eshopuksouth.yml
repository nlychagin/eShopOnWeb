name: Build & Deploy OrderItemsReserver

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    env:
      DOTNET_VERSION: '8.0'
      FUNCTION_APP_NAME: 'OrderItemsReserver-eshopuksouth'

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore & Publish
        run: |
          cd OrderItemsReserver
          dotnet restore
          dotnet publish -c Release -o ./publish

      - name: Package Function
        run: |
          cd OrderItemsReserver/publish
          zip -r ../../release.zip .

      - name: Deploy
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ env.FUNCTION_APP_NAME }}
          package: './release.zip'
          publish-profile: ${{ secrets.AZURE_FUNCTION_PUBLISH_PROFILE_API_SOUTH }}