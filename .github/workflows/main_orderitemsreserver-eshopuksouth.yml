name: Build and deploy .NET 10 to OrderItemsReserver-eshopuksouth

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  DOTNET_VERSION: '10.0'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 'Checkout GitHub Action'
        uses: actions/checkout@v4

      - name: Setup DotNet ${{ env.DOTNET_VERSION }} Environment
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: 'Build and Publish'
        shell: bash
        # Added -p:PublishReadyToRun=false to ensure metadata isn't stripped
        run: |
          dotnet publish src/OrderItemsReserver/OrderItemsReserver.csproj \
            --configuration Release \
            --output ./publish-out \
            --runtime linux-x64 \
            --self-contained true \
            -p:PublishReadyToRun=false

      - name: 'Package for Flex Consumption'
        shell: bash
        run: |
          cd ./publish-out
          zip -r ../release.zip .

      - name: 'Deploy to Azure'
        uses: Azure/functions-action@v1
        with:
          app-name: 'OrderItemsReserver-eshopuksouth'
          package: './release.zip'
          publish-profile: ${{ secrets.AZURE_FUNCTION_PUBLISH_PROFILE_API_SOUTH }}
          sku: 'flexconsumption'